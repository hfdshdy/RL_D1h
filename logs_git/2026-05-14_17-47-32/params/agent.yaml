seed: 42
device: cuda:0
num_steps_per_env: 24
max_iterations: 1000
empirical_normalization: false
policy:
  class_name: ActorCriticHistoryEncoder
  init_noise_std: 1.0
  actor_hidden_dims:
  - 256
  - 128
  - 64
  critic_hidden_dims:
  - 256
  - 128
  - 64
  activation: elu
algorithm:
  class_name: PPO
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  entropy_coef: 0.005
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  desired_kl: 0.01
  max_grad_norm: 1.0
save_interval: 50
experiment_name: d1h_ddt_flat_velocity
experiment_description: 'D1H DDT-compatible flat velocity: 33-dim obs, 10-frame history
  encoder, 8-dim action.'
run_name: ''
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: true
load_run: 2026-05-14_17-35-00
load_checkpoint: model_4050.pt
num_policy_stacks: 0
num_critic_stacks: 0
use_constraint_rl: false
